          - "Ruff F401 errors closed in the 3 legacy files (`ruff check --select F401 python_refactor/data_analysis.py python_refactor/ftse_data_downloader*.py` returns 0 errors)"
          - "uv.lock NOT added in this unit (locked installs are a separate concern; pyproject alone is enough for ADR-033 §Stage 2 wheel-shipping ergonomics)"
