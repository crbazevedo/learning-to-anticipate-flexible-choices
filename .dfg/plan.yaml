    parallel_groups:
      - [W2-1, W2-2, W2-3, W2-4]

    gate:
      gate_type: wave-gate
      criteria:
        - "All 4 units MERGED to master (squash-merge) with green pre-pr battery"
        - "Pre-pr collection-error count drops materially in .venv-w1 (target: 0 collection errors from `from algorithms.X` family after W2-2)"
        - "Pre-pr ruff F401 count drops by 11 in legacy files after W2-4"
        - "W1 wave-close ceremony fires CLEAN after W2 merges (no open carries from W1-3/W1-4/W1-5 listed in W1-gate verdict)"
        - "Retro for each unit at .dfg/retrospectives/W2/W2-N.md with ADR-004 YAML frontmatter"
